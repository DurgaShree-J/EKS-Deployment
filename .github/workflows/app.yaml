name: Application CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: startup-eks
  ECR_REPOSITORY: python-app

jobs:

# TEST 
  test:
   
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r application/requirements.txt
          pip install pytest

      - name: Run Unit Tests
        run: |
          PYTHONPATH=. pytest

      # - name: List files
      #   run: |
      #     pwd
      #     ls -la
      #     find . -name "requirements.txt"

      - name: Dependency Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./application/test
          severity: HIGH,CRITICAL


#Build and Deploy
  build-push-deploy-staging:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile/dockerfile -t $ECR_REPOSITORY:${{ github.sha }} .


      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: List Docker images
        run: docker images

      - name: Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: Ensure Kubernetes Resources Exist
        run: |
          kubectl apply -f k8s/staging

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/python-app-deployment \
          python-app=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} 


       # Verify rollout
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/python-app-deployment

#deploy to prod
  deploy-production:
    
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: List files
        run: |
          pwd
          ls -R

      - name: Ensure Kubernetes Resources Exist
        run: |
          kubectl apply -f k8s/prod

      - name: Deploy Production
        run: |
          kubectl set image deployment/python-app-deployment \
          python-app=${{ env.ECR_REPOSITORY }}:${{ github.sha }} 

      - name: Verify Production Rollout
        run: |
          kubectl rollout status deployment/python-app-deployment 
   

  notify-failure:
    name: Email Notification on Failure

    if: always()

    needs:
      - test
      - build-push-deploy-staging
      - deploy-production

    runs-on: ubuntu-latest

    steps:
      - name: Send Email
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: |
             GitHub Actions Pipeline Failed

          to: ${{ secrets.EMAIL_TO }}

          from: GitHub Actions

          body: |
            CI/CD Pipeline Failure

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}

            Check workflow logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}